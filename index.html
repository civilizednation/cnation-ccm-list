<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>cnation CCM 아카이브 🎵</title>

    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#4f46e5">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="cnation CCM">
    <link rel="apple-touch-icon" href="./icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .modal-content {
            max-height: 85vh;
            overflow-y: auto;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen font-sans text-gray-800 pb-20">

    <div class="max-w-2xl mx-auto pt-6 px-4">

        <div
            class="relative rounded-2xl shadow-lg mb-8 overflow-hidden bg-gray-800 flex items-center justify-center min-h-[180px]">
            <div class="absolute inset-0 bg-cover bg-center bg-no-repeat"
                style="background-image: url('./cnation-ccm.png');"></div>
            <div class="absolute inset-0 bg-black/40 backdrop-blur-[2px]"></div>
            <div class="relative z-10 p-6 text-center w-full">
                <h1
                    class="text-4xl sm:text-5xl font-extrabold text-white mb-2 tracking-widest drop-shadow-lg uppercase">
                    cnation CCM
                </h1>
                <p class="text-gray-100 text-sm tracking-widest drop-shadow-md font-medium">
                    은혜와 찬양의 기록
                </p>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm p-4 mb-6 relative">
            <div class="flex justify-between items-center mb-4 px-2">
                <h2 class="text-lg font-bold text-gray-700">전체 곡 목록</h2>
                <select id="sortSelect"
                    class="text-xs border border-gray-300 text-gray-600 py-1 px-2 rounded-lg focus:ring-2 focus:ring-indigo-400 bg-gray-50 outline-none cursor-pointer">
                    <option value="creationDate_desc">최신 제작일순 🔽</option>
                    <option value="creationDate_asc">오래된 제작일순 🔼</option>
                    <option value="title_asc">제목 가나다순 🔼</option>
                    <option value="title_desc">제목 역순 🔽</option>
                    <option value="creator_asc">작사/작곡자순 🔼</option>
                </select>
            </div>
            <div id="songList" class="space-y-3">
                <p class="text-center text-gray-400 py-4">데이터를 불러오는 중입니다...</p>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
            <button id="toggleFormBtn"
                class="w-full flex justify-between items-center p-5 focus:outline-none hover:bg-gray-50 transition">
                <h2 class="text-lg font-bold text-gray-700">새로운 곡 등록하기</h2>
                <span id="toggleIcon"
                    class="text-xl text-indigo-600 font-bold transition-transform duration-300">➕</span>
            </button>

            <div id="formContent" class="hidden px-5 pb-6">
                <div class="grid grid-cols-1 gap-4 mt-2 border-t border-gray-100 pt-4">
                    <div class="flex gap-2">
                        <select id="typeInput"
                            class="px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 bg-gray-50 text-sm outline-none">
                            <option value="창작곡">창작곡</option>
                            <option value="커버송">커버송</option>
                        </select>
                        <input type="text" id="titleInput" placeholder="곡 제목 (예: 나를 부르신 이유)"
                            class="flex-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 text-sm outline-none">
                    </div>

                    <div class="flex gap-2">
                        <input type="text" id="creatorInput" placeholder="작사/작곡 (예: 문명국)"
                            class="flex-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 text-sm outline-none">
                        <div class="relative w-36">
                            <input type="date" id="dateInput" title="곡 제작일"
                                class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 text-sm text-gray-600 bg-gray-50 outline-none">
                        </div>
                    </div>

                    <input type="text" id="youtubeInput" placeholder="유튜브 주소 링크"
                        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 text-sm outline-none">

                    <div class="p-4 bg-gray-50 border border-dashed border-gray-300 rounded-lg space-y-3">
                        <div>
                            <label class="block text-[11px] font-bold text-gray-500 mb-1 uppercase tracking-wider">🖼️
                                타이틀 이미지 (필수)</label>
                            <input type="file" id="imageInput" accept="image/*"
                                class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-gray-500 mb-1 uppercase tracking-wider">🎵
                                MP3 음원 (선택)</label>
                            <input type="file" id="mp3Input" accept="audio/mp3"
                                class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                        </div>
                    </div>

                    <textarea id="descInput" rows="2" placeholder="곡 설명 (설교 본문, 핵심 메시지 등)"
                        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 text-sm outline-none"></textarea>
                    <textarea id="lyricsInput" rows="5" placeholder="가사 (Verse, Chorus 등 줄바꿈 유지)"
                        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 text-sm outline-none"></textarea>
                    <textarea id="promptInput" rows="2" placeholder="제작 정보 (Suno 프롬프트, 스타일 등)"
                        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 text-sm outline-none"></textarea>

                    <button id="addBtn"
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-md mt-2">
                        업로드 및 등록하기
                    </button>
                    <p id="uploadStatus" class="text-sm text-center text-indigo-600 font-bold hidden">업로드 중입니다... 잠시만
                        기다려주세요 ⏳</p>
                </div>
            </div>
        </div>
    </div>

    <div id="detailModal" class="fixed inset-0 bg-black bg-opacity-70 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl w-full max-w-lg shadow-2xl relative flex flex-col modal-content"
            style="max-height: 85vh;">
            <button onclick="closeModal()"
                class="absolute top-3 right-3 text-gray-500 hover:text-gray-900 bg-white/90 backdrop-blur rounded-full w-8 h-8 flex items-center justify-center shadow-lg z-20 transition-all">
                <i class="fas fa-times text-lg"></i>
            </button>
            <div id="modalContent" class="overflow-y-auto w-full rounded-2xl pb-6">
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, serverTimestamp, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        // ★ 팀장님의 파이어베이스 설정값입니다 ★
        const firebaseConfig = {
            apiKey: "AIzaSyCTwOAC_LrrKH8CKepUOTf0pyd9qRv4y_8",
            authDomain: "cnation-project.firebaseapp.com",
            projectId: "cnation-project",
            storageBucket: "cnation-project.firebasestorage.app",
            messagingSenderId: "1004154104261",
            appId: "1:1004154104261:web:0eac4c7ded38262ae5c3ac",
            measurementId: "G-7PW1NSP5EQ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const collectionName = "cnation-ccm-list";

        let globalSongs = [];
        let unsubscribe = null;
        const ADMIN_PASSWORD = "1257"; // 팀장님 전용 비밀번호

        document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];

        // 🟠 아코디언 (접기/펴기) 제어
        document.getElementById('toggleFormBtn').addEventListener('click', () => {
            const formContent = document.getElementById('formContent');
            const toggleIcon = document.getElementById('toggleIcon');

            if (formContent.classList.contains('hidden')) {
                formContent.classList.remove('hidden');
                toggleIcon.textContent = '➖';
            } else {
                formContent.classList.add('hidden');
                toggleIcon.textContent = '➕';
            }
        });

        // 🖼️ 브라우저단 썸네일 생성 함수
        function generateThumbnail(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const max_size = 300; // 썸네일 최대 너비/높이

                        if (width > height) {
                            if (width > max_size) {
                                height *= max_size / width;
                                width = max_size;
                            }
                        } else {
                            if (height > max_size) {
                                width *= max_size / height;
                                height = max_size;
                            }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);

                        // 저화질 JPEG로 변환 (0.6 수율)
                        canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.6);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        // 1. 등록 로직
        document.getElementById('addBtn').addEventListener('click', async () => {
            const title = document.getElementById('titleInput').value;
            const type = document.getElementById('typeInput').value;
            const creator = document.getElementById('creatorInput').value;
            const creationDate = document.getElementById('dateInput').value;
            const imageFile = document.getElementById('imageInput').files[0];
            const mp3File = document.getElementById('mp3Input').files[0];

            if (!title || !imageFile || !creationDate) {
                alert('곡 제목, 타이틀 이미지, 그리고 제작일은 필수입니다!');
                return;
            }

            document.getElementById('addBtn').classList.add('hidden');
            document.getElementById('uploadStatus').classList.remove('hidden');

            try {
                // 원본 이미지 업로드
                const timeStr = Date.now();
                const originalImageRef = ref(storage, `${collectionName}/images/${timeStr}_${imageFile.name}`);
                await uploadBytes(originalImageRef, imageFile);
                const imageUrl = await getDownloadURL(originalImageRef);

                // 썸네일 이미지 생성 및 업로드
                const thumbnailBlob = await generateThumbnail(imageFile);
                const thumbnailRef = ref(storage, `${collectionName}/thumbnails/${timeStr}_${imageFile.name}.jpg`);
                await uploadBytes(thumbnailRef, thumbnailBlob);
                const thumbnailUrl = await getDownloadURL(thumbnailRef);

                let mp3Url = "";
                if (mp3File) {
                    const mp3Ref = ref(storage, `${collectionName}/audio/${timeStr}_${mp3File.name}`);
                    await uploadBytes(mp3Ref, mp3File);
                    mp3Url = await getDownloadURL(mp3Ref);
                }

                await addDoc(collection(db, collectionName), {
                    title: title,
                    type: type,
                    creator: creator,
                    creationDate: creationDate,
                    youtubeUrl: document.getElementById('youtubeInput').value,
                    desc: document.getElementById('descInput').value,
                    lyrics: document.getElementById('lyricsInput').value,
                    prompt: document.getElementById('promptInput').value,
                    imageUrl: imageUrl,       // 원본은 여기에
                    thumbnailUrl: thumbnailUrl, // 썸네일은 여기에
                    mp3Url: mp3Url,
                    createdAt: serverTimestamp()
                });

                alert("성공적으로 곡이 등록되었습니다! 🎉");
                location.reload();
            } catch (error) {
                console.error("업로드 에러:", error);
                alert("업로드 중 에러가 발생했습니다.");
                document.getElementById('addBtn').classList.remove('hidden');
                document.getElementById('uploadStatus').classList.add('hidden');
            }
        });

        // 2. 리스트 불러오기 (썸네일 적용)
        function loadSongs(sortField, sortDirection) {
            if (unsubscribe) unsubscribe();

            const q = query(collection(db, collectionName), orderBy(sortField, sortDirection));

            unsubscribe = onSnapshot(q, (snapshot) => {
                const listDiv = document.getElementById('songList');
                listDiv.innerHTML = '';
                globalSongs = [];

                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const id = docSnap.id;
                    globalSongs.push({ id, ...data });

                    const tagColor = data.type === '창작곡' ? 'bg-indigo-100 text-indigo-700' : 'bg-emerald-100 text-emerald-700';
                    const dateStr = data.creationDate ? data.creationDate.split('-').join('. ') + '.' : '';

                    // 썸네일 URL이 있으면 썸네일을, 없으면 원본 이미지를 불러옵니다.
                    const displayImage = data.thumbnailUrl ? data.thumbnailUrl : data.imageUrl;

                    const itemHtml = `
                        <div onclick="openModal('${id}')" class="flex items-center p-3 bg-white border border-gray-100 rounded-xl hover:shadow-md cursor-pointer transition">
                            <img src="${displayImage}" class="w-16 h-16 rounded-lg object-cover shadow-sm mr-4" alt="cover">
                            <div class="flex-1">
                                <div class="flex items-center justify-between mb-0.5">
                                    <h3 class="font-bold text-gray-800 text-base line-clamp-1">${data.title}</h3>
                                    <span class="text-[10px] text-gray-400 font-medium">${dateStr}</span>
                                </div>
                                <div class="flex items-center">
                                    <span class="text-[9px] font-bold px-1.5 py-0.5 rounded ${tagColor} mr-2">${data.type}</span>
                                    <span class="text-xs text-gray-500">${data.creator}</span>
                                </div>
                            </div>
                            <div class="w-8 flex justify-end text-indigo-400">
                                <i class="fas fa-chevron-right"></i>
                            </div>
                        </div>
                    `;
                    listDiv.innerHTML += itemHtml;
                });
            });
        }

        loadSongs('creationDate', 'desc');

        document.getElementById('sortSelect').addEventListener('change', (e) => {
            const selectedValue = e.target.value;
            const [field, direction] = selectedValue.split('_');
            loadSongs(field, direction);
        });

        // 3. 모달 상세화면 (원본 이미지 사용)
        window.openModal = (id) => {
            const song = globalSongs.find(s => s.id === id);
            if (!song) return;

            let ytEmbed = "";
            if (song.youtubeUrl) {
                let videoId = song.youtubeUrl.split('v=')[1]?.split('&')[0] || song.youtubeUrl.split('youtu.be/')[1]?.split('?')[0];
                if (videoId) ytEmbed = `<iframe class="w-full aspect-video mb-4 rounded-lg shadow-sm" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>`;
            }

            let audioPlayer = song.mp3Url ? `<audio controls class="w-full mt-2 mb-4 px-4"><source src="${song.mp3Url}" type="audio/mp3"></audio>` : '';
            const dateStr = song.creationDate ? song.creationDate.split('-').join('. ') + '.' : '';

            const contentHtml = `
                <div><img src="${song.imageUrl}" class="w-full aspect-square object-cover" alt="cover"></div>
                <div class="p-6">
                    <div class="flex justify-between items-start mb-1">
                        <h2 class="text-2xl font-bold text-gray-800">${song.title}</h2>
                        <span class="text-xs text-gray-500 mt-2 font-medium">${dateStr} 제작</span>
                    </div>
                    <p class="text-sm text-gray-500 mb-4">작사/작곡: ${song.creator} | ${song.type}</p>
                    
                    ${audioPlayer}
                    ${ytEmbed}

                    <div class="space-y-4 mt-6">
                        ${song.desc ? `<div><h4 class="text-[11px] font-bold text-indigo-600 mb-1 tracking-widest uppercase">📖 곡 설명 / 말씀</h4><p class="text-sm text-gray-700 bg-gray-50 p-4 rounded-xl leading-relaxed">${song.desc.replace(/\n/g, '<br>')}</p></div>` : ''}
                        ${song.lyrics ? `<div><h4 class="text-[11px] font-bold text-indigo-600 mb-1 tracking-widest uppercase">🎤 가사</h4><p class="text-sm text-gray-700 bg-gray-50 p-4 rounded-xl whitespace-pre-line leading-relaxed">${song.lyrics}</p></div>` : ''}
                        ${song.prompt ? `<div><h4 class="text-[11px] font-bold text-indigo-600 mb-1 tracking-widest uppercase">🛠️ 제작 정보</h4><p class="text-[11px] text-gray-500 bg-gray-100 p-4 rounded-xl whitespace-pre-line">${song.prompt}</p></div>` : ''}
                    </div>
                    
                    <div class="mt-8 pt-4 border-t border-gray-100 flex justify-end gap-3">
                        <button onclick="editSong('${id}')" class="text-xs text-indigo-500 hover:text-indigo-700 font-bold bg-indigo-50 px-3 py-1.5 rounded-lg transition">수정하기</button>
                        <button onclick="deleteSong('${id}')" class="text-xs text-red-500 hover:text-red-700 font-bold bg-red-50 px-3 py-1.5 rounded-lg transition">삭제하기</button>
                    </div>
                </div>
            `;

            document.getElementById('modalContent').innerHTML = contentHtml;
            document.getElementById('detailModal').classList.remove('hidden');
        };

        window.closeModal = () => {
            document.getElementById('detailModal').classList.add('hidden');
            document.getElementById('modalContent').innerHTML = '';
        };

        // 4. 삭제 기능 (비밀번호 확인)
        window.deleteSong = async (id) => {
            const pwd = prompt("관리자 권한 확인: 비밀번호 4자리를 입력하세요");
            if (pwd !== ADMIN_PASSWORD) {
                alert("비밀번호가 일치하지 않습니다.");
                return;
            }

            if (confirm("정말 이 곡의 기록을 삭제하시겠습니까? (삭제 후 복구 불가)")) {
                await deleteDoc(doc(db, collectionName, id));
                closeModal();
            }
        };

        // 5. 수정 모드 진입 (비밀번호 확인)
        window.editSong = (id) => {
            const pwd = prompt("관리자 권한 확인: 비밀번호 4자리를 입력하세요");
            if (pwd !== ADMIN_PASSWORD) {
                alert("비밀번호가 일치하지 않습니다.");
                return;
            }

            const song = globalSongs.find(s => s.id === id);
            if (!song) return;

            const editHtml = `
                <div class="p-6 bg-gray-50 rounded-2xl modal-content overflow-y-auto" style="max-height: 80vh;">
                    <h2 class="text-xl font-bold text-indigo-700 mb-4 border-b pb-2">✏️ 곡 정보 수정하기</h2>
                    <div class="space-y-4">
                        <div class="flex gap-2">
                            <select id="editType" class="px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 bg-white text-sm outline-none">
                                <option value="창작곡" ${song.type === '창작곡' ? 'selected' : ''}>창작곡</option>
                                <option value="커버송" ${song.type === '커버송' ? 'selected' : ''}>커버송</option>
                            </select>
                            <input type="text" id="editTitle" value="${song.title}" class="flex-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 text-sm outline-none" placeholder="곡 제목">
                        </div>
                        <div class="flex gap-2">
                            <input type="text" id="editCreator" value="${song.creator}" class="flex-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 text-sm outline-none" placeholder="작사/작곡">
                            <input type="date" id="editDate" value="${song.creationDate}" class="w-36 px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 text-sm text-gray-600 bg-white outline-none">
                        </div>
                        <input type="text" id="editYoutube" value="${song.youtubeUrl || ''}" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 text-sm outline-none" placeholder="유튜브 주소 링크">
                        
                        <div class="p-3 bg-white border border-dashed border-gray-300 rounded-lg space-y-3">
                            <div>
                                <label class="block text-[11px] font-bold text-gray-500 mb-1">🖼️ 새 타이틀 이미지 (변경할 경우만 선택)</label>
                                <input type="file" id="editImage" accept="image/*" class="w-full text-xs text-gray-500 file:mr-2 file:py-1 file:px-3 file:rounded-full file:border-0 file:bg-indigo-50 file:text-indigo-700">
                            </div>
                            <div>
                                <label class="block text-[11px] font-bold text-gray-500 mb-1">🎵 새 MP3 음원 (변경할 경우만 선택)</label>
                                <input type="file" id="editMp3" accept="audio/mp3" class="w-full text-xs text-gray-500 file:mr-2 file:py-1 file:px-3 file:rounded-full file:border-0 file:bg-indigo-50 file:text-indigo-700">
                            </div>
                        </div>

                        <textarea id="editDesc" rows="2" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 text-sm outline-none" placeholder="곡 설명">${song.desc || ''}</textarea>
                        <textarea id="editLyrics" rows="5" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 text-sm outline-none" placeholder="가사">${song.lyrics || ''}</textarea>
                        <textarea id="editPrompt" rows="2" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 text-sm outline-none" placeholder="제작 정보">${song.prompt || ''}</textarea>
                        
                        <div class="flex gap-2 mt-4 pt-2 border-t border-gray-200">
                            <button onclick="saveEdit('${id}')" id="saveEditBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-lg transition">저장 완료</button>
                            <button onclick="openModal('${id}')" class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-700 font-bold py-2.5 rounded-lg transition">취소</button>
                        </div>
                        <p id="editStatus" class="text-sm text-center text-indigo-600 font-bold hidden mt-2">수정 중입니다... ⏳</p>
                    </div>
                </div>
            `;
            document.getElementById('modalContent').innerHTML = editHtml;
        };

        // 6. 수정 사항 저장 (썸네일 포함)
        window.saveEdit = async (id) => {
            const song = globalSongs.find(s => s.id === id);
            if (!song) return;

            const title = document.getElementById('editTitle').value;
            const type = document.getElementById('editType').value;
            const creator = document.getElementById('editCreator').value;
            const creationDate = document.getElementById('editDate').value;
            const youtubeUrl = document.getElementById('editYoutube').value;
            const desc = document.getElementById('editDesc').value;
            const lyrics = document.getElementById('editLyrics').value;
            const promptInfo = document.getElementById('editPrompt').value;

            const imageFile = document.getElementById('editImage').files[0];
            const mp3File = document.getElementById('editMp3').files[0];

            if (!title || !creationDate) {
                alert("제목과 제작일은 필수입니다!");
                return;
            }

            document.getElementById('saveEditBtn').classList.add('hidden');
            document.getElementById('editStatus').classList.remove('hidden');

            try {
                let imageUrl = song.imageUrl;
                let thumbnailUrl = song.thumbnailUrl;

                // 이미지가 변경된 경우에만 원본 및 썸네일 다시 업로드
                if (imageFile) {
                    const timeStr = Date.now();

                    // 원본 업로드
                    const imageRef = ref(storage, `${collectionName}/images/${timeStr}_${imageFile.name}`);
                    await uploadBytes(imageRef, imageFile);
                    imageUrl = await getDownloadURL(imageRef);

                    // 썸네일 업로드
                    const thumbnailBlob = await generateThumbnail(imageFile);
                    const thumbnailRef = ref(storage, `${collectionName}/thumbnails/${timeStr}_${imageFile.name}.jpg`);
                    await uploadBytes(thumbnailRef, thumbnailBlob);
                    thumbnailUrl = await getDownloadURL(thumbnailRef);
                }

                let mp3Url = song.mp3Url;
                if (mp3File) {
                    const mp3Ref = ref(storage, `${collectionName}/audio/${Date.now()}_${mp3File.name}`);
                    await uploadBytes(mp3Ref, mp3File);
                    mp3Url = await getDownloadURL(mp3Ref);
                }

                await updateDoc(doc(db, collectionName, id), {
                    title: title,
                    type: type,
                    creator: creator,
                    creationDate: creationDate,
                    youtubeUrl: youtubeUrl,
                    desc: desc,
                    lyrics: lyrics,
                    prompt: promptInfo,
                    imageUrl: imageUrl,       // 원본은 여기에
                    thumbnailUrl: thumbnailUrl, // 썸네일은 여기에
                    mp3Url: mp3Url
                });

                alert("성공적으로 수정되었습니다! ✨");
                closeModal();
            } catch (error) {
                console.error("수정 에러:", error);
                alert("수정 중 오류가 발생했습니다.");
                document.getElementById('saveEditBtn').classList.remove('hidden');
                document.getElementById('editStatus').classList.add('hidden');
            }
        };
    </script>
</body>

</html>
